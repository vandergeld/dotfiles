# Set ctrl + spacebar as prefix
unbind C-Space
set -g prefix C-Space
bind C-Space send-prefix

## Mouse options
set -g mouse on

## History options
# Set history lines to 5000 to get more data
set-option -g history-limit 5000

## Windows
# Mark window
bind \` switch-client -t'{marked}'
# Set first index of a window to 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1
# Recalculate window number when removing
set -g renumber-windows on
# Set vertical and horizontal windowing to | and -
bind-key "|" split-window -h -c "#{pane_current_path}"
bind-key "\\" split-window -fh -c "#{pane_current_path}"
bind-key "-" split-window -v -c "#{pane_current_path}"
bind-key "_" split-window -fv -c "#{pane_current_path}"
# Swap to window
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1
# Stay on current path when creating new window
bind c new-window -c "#{pane_current_path}"
# Toggle windows and sessions
bind Space last-window
bind-key C-Space switch-client -l
# Resize
bind -r C-j resize-pane -D 15
bind -r C-k resize-pane -U 15
bind -r C-h resize-pane -L 15
bind -r C-l resize-pane -R 15
# Break and join window
bind j choose-window 'join-pane -h -s "%%"'
bind J choose-window 'join-pane -s "%%"'

# Reload tmux configuration file
bind r source-file ~/.tmux.conf \; display "Reloaded!"

## Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'TanglingTreats/tmux-everforest'
set -g @tmux-everforest 'dark-medium' 

run '~/.tmux/plugins/tpm/tpm'

# Status config
set -g status-position top

set -g @everforest_bg_dim '#232a2e'
set -g @everforest_bg0 '#2d353b'
set -g @everforest_bg1 '#343f44'
set -g @everforest_bg2 '#3d484d'
set -g @everforest_bg3 '#475258'
set -g @everforest_bg4 '#4f585e'
set -g @everforest_bg5 '#56635f'
set -g @everforest_bg_visual '#543a48'
set -g @everforest_bg_red '#514045'
set -g @everforest_bg_green '#425047'
set -g @everforest_bg_blue '#3a515d'
set -g @everforest_bg_yellow '#4d4c43'

set -g @everforest_fg '#d3c6aa'
set -g @everforest_red '#e67e80'
set -g @everforest_orange '#e69875'
set -g @everforest_yellow '#dbbc7f'
set -g @everforest_green '#a7c080'
set -g @everforest_aqua '#83c092'
set -g @everforest_blue '#7fbbb3'
set -g @everforest_purple '#d699b6'
set -g @everforest_grey0 '#7a8478'
set -g @everforest_grey1 '#859289'
set -g @everforest_grey2 '#9da9a0'
set -g @everforest_statusline1 '#a7c080'
set -g @everforest_statusline2 '#d3c6aa'
set -g @everforest_statusline3 '#e67e80'

set-option -g status-left-style none
set -g status-left-length 60
set -g status-left '#[fg=#{@everforest_bg_dim},bg=#{@everforest_green},bold] #S #[fg=#{@everforest_green},bg=#{@everforest_bg2},nobold]#[fg=#{@everforest_green},bg=#{@everforest_bg2},bold] #(whoami) #[fg=#{@everforest_bg2},bg=#{@everforest_bg0},nobold]#[fg=#{@everforest_fg},bg=#{@everforest_bg0},bold] #(pwd) #[fg=#{@everforest_bg0},bg=#{@everforest_bg0},nobold]'

set-option -g status-right-style none
set -g status-right-length 150
set -g status-right '#[fg=#{@everforest_bg2}]#[fg=#{@everforest_fg},bg=#{@everforest_bg2}] #[fg=#{@everforest_fg},bg=#{@everforest_bg2}]%d-%m-%Y  %H:%M  #h #[fg=#{@everforest_aqua},bg=#{@everforest_bg2},bold]#[fg=#{@everforest_bg_dim},bg=#{@everforest_aqua},bold] #(~/dotfiles/tmux/countdown_to_5pm.sh) '

set -g window-status-separator '#[fg=#{@everforest_grey2},bg=#{@everforest_bg0}] '
set -g window-status-format "#[fg=#{@everforest_grey0},bg=#{@everforest_bg0}] #I  #[fg=#{@everforest_grey0},bg=#{@everforest_bg0}]#W "
set -g window-status-current-format "#[fg=#{@everforest_bg0},bg=#{@everforest_bg_green}]#[fg=#{@everforest_fg},bg=#{@everforest_bg_green}] #I  #[fg=#{@everforest_fg},bg=#{@everforest_bg_green},bold]#W #[fg=#{@everforest_bg_green},bg=#{@everforest_bg0},nobold]"

# true color
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"

set -g pane-border-style fg="#414b50"
set -g pane-active-border-style fg="#a7c080"

set -g message-style bg="#272e33",fg="#d3c6aa"
set -g message-command-style bg="#272e33",fg="#d3c6aa"

set -g status-interval 60
